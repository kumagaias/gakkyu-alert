name: Deploy Lambda

# dev/main へのマージ時、Lambda に関連するファイルが変更された場合に実行
# dev → gakkyu-alert-*-dev Lambda
# main → gakkyu-alert-*-prd Lambda
on:
  push:
    branches: [dev, main]
    paths:
      - 'mobile/artifacts/api-server/**'
      - 'mobile/lib/**'
      - 'mobile/Dockerfile'
      - 'mobile/pnpm-lock.yaml'
      - '.github/workflows/deploy-lambda.yml'

# OIDC トークン取得に必要な最小権限
permissions:
  id-token: write  # OIDC JWT の発行
  contents: read   # checkout

env:
  AWS_REGION: ap-northeast-1
  AWS_ACCOUNT_ID: '843925270284'
  ENVIRONMENT: ${{ github.ref_name == 'main' && 'prd' || 'dev' }}

jobs:
  deploy:
    name: ${{ matrix.handler }} (${{ github.ref_name == 'main' && 'prd' || 'dev' }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false  # 1つ失敗しても他は続行
      matrix:
        include:
          - handler: api
          - handler: collect-closures
          - handler: collect-sentinel
          - handler: send-alerts

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # GitHub Actions OIDC で一時的な AWS 認証情報を取得
      # AWS_ACCESS_KEY_ID などの長期クレデンシャルは不要
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: "arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/gakkyu-alert-github-actions-deploy-${{ env.ENVIRONMENT }}"
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push to ECR
        uses: docker/build-push-action@v6
        with:
          context: mobile
          push: true
          build-args: HANDLER=${{ matrix.handler }}
          tags: |
            ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/gakkyu-alert-${{ matrix.handler }}-${{ env.ENVIRONMENT }}:latest
            ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/gakkyu-alert-${{ matrix.handler }}-${{ env.ENVIRONMENT }}:${{ github.sha }}
          # Lambda は Docker manifest v2 のみ対応。OCI 形式は拒否されるため無効化
          provenance: false
          # ハンドラーごとにキャッシュスコープを分けて干渉を防ぐ
          cache-from: type=gha,scope=${{ matrix.handler }}-${{ env.ENVIRONMENT }}
          cache-to: type=gha,mode=max,scope=${{ matrix.handler }}-${{ env.ENVIRONMENT }}

      # Lambda のコードを新しいイメージに更新
      # Terraform の ignore_changes で管理外のため AWS CLI で直接更新する
      - name: Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name "gakkyu-alert-${{ matrix.handler }}-${{ env.ENVIRONMENT }}" \
            --image-uri "${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/gakkyu-alert-${{ matrix.handler }}-${{ env.ENVIRONMENT }}:${{ github.sha }}" \
            --query '{FunctionName:FunctionName,CodeSize:CodeSize,LastModified:LastModified}' \
            --output table
